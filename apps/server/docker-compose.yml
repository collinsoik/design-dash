services:
  game-server:
    build:
      context: ../../
      dockerfile: apps/server/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - CORS_ORIGIN=https://design-dash-two.vercel.app,https://opendoorengineering.org
      - DB_PATH=/app/data/designdash.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
